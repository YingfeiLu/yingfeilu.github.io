<footer class="site-footer">
  <div class="site-footer__identity">
    <a href="{{ '/' | relative_url }}" class="site-footer__name">{{ site.title }} <span class="chinese-text" lang="zh">{{ site.chintitle }}</span></a>
    <p>{{ site.description }}</p>
  </div>
  <div class="site-footer__meta">
    <div class="social-links" aria-label="Social profiles">
      {% for item in site.data.settings.social %}
        <a href="{{ item.link }}" aria-label="{{ item.icon | replace: '-', ' ' | capitalize }}" target="_blank" rel="noopener noreferrer"><i class="fab fa-{{ item.icon }}" aria-hidden="true"></i></a>
      {% endfor %}
    </div>
    <p>&copy; {{ 'now' | date: '%Y' }} {{ site.title }}</p>
  </div>
</footer>
