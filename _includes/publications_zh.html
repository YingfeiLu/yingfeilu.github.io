<section class="research-overview" aria-labelledby="research-heading">
  <div>
    <p class="eyebrow">研究方向</p>
    <h2 id="research-heading">词语如何变化与流动</h2>
  </div>
  <div class="research-overview__content">
    <p>我的研究兴趣集中于形态学、新词研究与词典学。具体而言，我关注构词成分（词根、类词缀与词缀）、过渡形态学，以及英语与西班牙语的对比语言学。当前研究以 Mattiello（2022）提出的过渡形态学为框架，探讨两种语言中词缀与类词缀的区分，并希望为这一理论模型的发展作出贡献。</p>
    <h3>研究目标</h3>
    <ol class="research-objectives">
      <li>理解构词过程中的形态模式</li>
      <li>评估跨语言语义的稳定性</li>
      <li>探究数字词典中的词典学呈现</li>
    </ol>
  </div>
</section>
