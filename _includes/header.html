<header class="site-header">
  <div class="site-header__inner">
    <a href="{{ '/' | relative_url }}" class="site-brand" aria-label="{{ site.title }}, home">
      <span class="site-brand__name">{{ site.title }}</span>
      <span class="site-brand__chinese chinese-text" lang="zh">{{ site.chintitle }}</span>
    </a>

    <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="site-navigation">
      <span class="menu-toggle__label">Menu</span>
      <span class="menu-toggle__icon" aria-hidden="true"><span></span><span></span></span>
    </button>

    <nav class="site-nav" id="site-navigation" aria-label="Primary navigation">
      {% for item in site.data.settings.menu %}
        {% assign current_url = page.url | remove: '.html' | remove_last: '/' %}
        <a class="site-nav__link{% if current_url == item.url %} is-active{% endif %}"
           {% if current_url == item.url %}aria-current="page"{% endif %}
           href="{{ item.url | relative_url }}">{{ item.name }}</a>
      {% endfor %}
    </nav>
  </div>
</header>
