{% for contact in site.data.settings.contacts %}
<article class="contact-card">
  <div class="contact-card__details">
    <p class="eyebrow">Contact details</p>
    <h2>{{ contact.name }}</h2>
    <p class="contact-card__role">{{ contact.position }} · {{ contact.department | strip }}</p>
    <dl class="contact-list">
      <div>
        <dt>Institution</dt>
        <dd>{{ contact.institution }}</dd>
      </div>
      <div>
        <dt>Address</dt>
        <dd>{{ contact.institution_address }}</dd>
      </div>
      <div>
        <dt>Email</dt>
        <dd><a class="contact-card__email" href="mailto:{{ contact.email }}">{{ contact.email }}</a></dd>
      </div>
      <div>
        <dt>Office</dt>
        <dd>{{ contact.office }}</dd>
      </div>
    </dl>
  </div>
  <div class="contact-card__image">
    <img src="{{ '/' | append: contact.image | relative_url }}" alt="Portrait of {{ contact.name }}" width="1279" height="1706">
  </div>
</article>
{% endfor %}
