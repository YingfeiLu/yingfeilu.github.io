---
layout: default
---

<header class="page-header">
  <p class="eyebrow">Research group</p>
  <h1>{{ page.title | default: "People" }}</h1>
  <div class="page-header__intro">{{ content }}</div>
  <div class="page-header__rule" aria-hidden="true"></div>
</header>
<div class="bio-grid">
{% for person in site.data.settings.people %}
<article class="bio-card">
    <h2>{{ person.name }}</h2>
    <p>Email: {{ person.email }}</p>
    <p>Phone: {{ person.phone }}</p>
    <p><a href="{{ '/people/' | append: person.url | relative_url }}">More info</a></p>
</article>
{% endfor %}
</div>
