---
layout: default
---

<article>
  <header class="page-header">
    <div class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %-d, %Y" }}</time>
    </div>
    <h1>{{ page.title }}</h1>
    <div class="page-header__rule" aria-hidden="true"></div>
  </header>
  <div class="post-body">
    {{ content }}
  </div>
</article>
